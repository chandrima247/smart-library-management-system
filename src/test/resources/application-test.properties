# In-memory, throwaway database for tests. DataSeeder is disabled on this profile.
spring.datasource.url=jdbc:h2:mem:slms-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false
# Avoid external calls during tests
slms.google-books.enabled=false
