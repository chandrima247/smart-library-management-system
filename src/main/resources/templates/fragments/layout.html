<!DOCTYPE html>
<!-- ===================================================================
     DASHBOARD LAYOUT — sidebar + topbar chrome around page content.
     Usage from a page:
       <html th:replace="~{fragments/layout :: dashboard(~{::main}, 'Title', 'navKey')}">
         <main> ...page content... </main>
       </html>
     =================================================================== -->
<html th:fragment="dashboard(content, title, active)" xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body class="font-body text-on-surface">
    <div th:replace="~{fragments/nav :: sidebar(${active})}"></div>
    <div th:replace="~{fragments/nav :: topbar(${title})}"></div>

    <div class="pt-24 pb-16 px-5 md:ml-[280px] md:px-8 max-w-[1440px]">
        <div th:replace="~{fragments/ui :: flash}"></div>
        <th:block th:replace="${content}"></th:block>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
