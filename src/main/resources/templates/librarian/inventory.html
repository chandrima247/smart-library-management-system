<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: dashboard(~{::main}, 'Inventory', 'inventory')}">
<main>
    <h1 class="font-display text-3xl font-black mb-6">Inventory</h1>

    <section class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
        <!-- Add book -->
        <div class="lg:col-span-5 bg-white neobrutal-border neobrutal-shadow p-6 self-start">
            <h2 class="font-display text-xl font-black mb-1">Add a Title</h2>
            <p class="text-sm text-secondary mb-4">Enter an ISBN and tap Look up to auto-fill from Google Books.</p>

            <form th:action="@{/librarian/inventory}" th:object="${bookForm}" method="post" class="space-y-3">
                <div class="flex gap-2">
                    <input class="nb-input" id="isbn" type="text" th:field="*{isbn}" placeholder="ISBN (e.g. 9780132350884)"/>
                    <button type="button" id="lookupBtn" class="nb-btn nb-btn-light whitespace-nowrap !px-3">Look up</button>
                </div>
                <p id="lookupStatus" class="text-xs font-bold text-secondary"></p>

                <input class="nb-input" id="title" type="text" th:field="*{title}" placeholder="Title"/>
                <input class="nb-input" id="author" type="text" th:field="*{author}" placeholder="Author"/>
                <div class="grid grid-cols-2 gap-3">
                    <input class="nb-input" id="category" type="text" th:field="*{category}" placeholder="Category"/>
                    <input class="nb-input" id="publisher" type="text" th:field="*{publisher}" placeholder="Publisher"/>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input class="nb-input" id="shelfLocation" type="text" th:field="*{shelfLocation}" placeholder="Shelf (e.g. A-12)"/>
                    <input class="nb-input" type="number" min="1" max="500" th:field="*{copies}" placeholder="Copies"/>
                </div>
                <input type="hidden" id="coverUrl" th:field="*{coverUrl}"/>
                <input type="hidden" id="publishedDate" th:field="*{publishedDate}"/>
                <input type="hidden" id="language" th:field="*{language}"/>
                <button class="nb-btn nb-btn-primary w-full" type="submit">Add to Catalogue</button>
            </form>
        </div>

        <!-- Catalogue list -->
        <div class="lg:col-span-7">
            <form th:action="@{/librarian/inventory}" method="get" class="flex gap-2 mb-4">
                <input class="nb-input" type="text" name="q" th:value="${q}" placeholder="Search inventory"/>
                <button class="nb-btn nb-btn-light" type="submit">Search</button>
            </form>

            <div class="space-y-3" th:if="${!books.isEmpty()}">
                <div th:each="bv : ${books}" class="bg-white neobrutal-border neobrutal-shadow-sm p-4 flex items-center gap-4">
                    <div class="w-12 h-16 neobrutal-border-2 bg-surface-container flex items-center justify-center shrink-0 overflow-hidden">
                        <img th:if="${bv.book.coverUrl}" th:src="${bv.book.coverUrl}" class="w-full h-full object-cover" alt=""/>
                        <span th:unless="${bv.book.coverUrl}" class="material-symbols-outlined text-outline">book_2</span>
                    </div>
                    <div class="min-w-0 flex-grow">
                        <p class="font-bold truncate" th:text="${bv.book.title}">Title</p>
                        <p class="text-xs text-secondary truncate" th:text="${bv.book.author} + ' · ' + ${bv.book.isbn}">meta</p>
                        <p class="text-xs font-bold mt-1"
                           th:classappend="${bv.availableCount > 0} ? 'text-success' : 'text-danger'"
                           th:text="${bv.availableCount} + ' available'">avail</p>
                    </div>
                    <form th:action="@{'/librarian/inventory/' + ${bv.book.id} + '/copies'}" method="post" class="flex gap-1 shrink-0">
                        <input name="count" type="number" min="1" value="1" class="nb-input !py-1.5 w-16 text-sm"/>
                        <button class="nb-btn nb-btn-light !px-3 !py-1.5 text-xs whitespace-nowrap">+ Copies</button>
                    </form>
                </div>
            </div>
            <div th:if="${books.isEmpty()}" th:replace="~{fragments/ui :: empty('No titles found.')}"></div>

            <div th:if="${pageInfo.totalPages > 1}" class="flex justify-center items-center gap-3 mt-6">
                <a th:if="${!pageInfo.first}" class="nb-btn nb-btn-light" th:href="@{/librarian/inventory(q=${q}, page=${pageInfo.number - 1})}">Prev</a>
                <span class="font-bold" th:text="'Page ' + (${pageInfo.number} + 1) + ' of ' + ${pageInfo.totalPages}">Page</span>
                <a th:if="${!pageInfo.last}" class="nb-btn nb-btn-light" th:href="@{/librarian/inventory(q=${q}, page=${pageInfo.number + 1})}">Next</a>
            </div>
        </div>
    </section>

    <script th:inline="none">
        document.getElementById('lookupBtn').addEventListener('click', function () {
            var isbn = document.getElementById('isbn').value.trim();
            var status = document.getElementById('lookupStatus');
            if (!isbn) { status.textContent = 'Enter an ISBN first.'; return; }
            status.textContent = 'Looking up…';
            fetch('/librarian/inventory/isbn?isbn=' + encodeURIComponent(isbn))
                .then(function (r) { return r.json(); })
                .then(function (m) {
                    if (!m.resolved) { status.textContent = 'No match — enter details manually.'; return; }
                    function set(id, v) { if (v) document.getElementById(id).value = v; }
                    set('title', m.title); set('author', m.author); set('category', m.category);
                    set('publisher', m.publisher); set('coverUrl', m.coverUrl);
                    set('publishedDate', m.publishedDate); set('language', m.language);
                    status.textContent = 'Found: ' + (m.title || '') ;
                })
                .catch(function () { status.textContent = 'Lookup failed — enter details manually.'; });
        });
    </script>
</main>
</html>
