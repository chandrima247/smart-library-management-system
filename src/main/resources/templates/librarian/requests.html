<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: dashboard(~{::main}, 'Borrow Requests', 'requests')}">
<main>
    <h1 class="font-display text-3xl font-black mb-6">Pending Borrow Requests</h1>

    <div class="bg-white neobrutal-border neobrutal-shadow overflow-x-auto" th:if="${!requests.isEmpty()}">
        <table class="nb-table">
            <thead><tr><th>Student</th><th>Title</th><th>Type</th><th>Requested</th><th class="text-right">Action</th></tr></thead>
            <tbody>
            <tr th:each="r : ${requests}">
                <td>
                    <p class="font-bold" th:text="${r.student.fullName}">Student</p>
                    <p class="text-xs text-secondary" th:text="${r.student.memberCode}">code</p>
                </td>
                <td class="font-bold" th:text="${r.book.title}">Title</td>
                <td><span class="nb-badge" th:text="${r.borrowType}">HOME</span></td>
                <td class="text-sm" th:text="${r.createdDate}">date</td>
                <td>
                    <div class="flex flex-col sm:flex-row gap-2 justify-end items-stretch sm:items-center">
                        <form th:action="@{'/librarian/requests/' + ${r.id} + '/approve'}" method="post">
                            <button class="nb-btn nb-btn-success !px-3 !py-1.5 text-xs w-full">Approve</button>
                        </form>
                        <form th:action="@{'/librarian/requests/' + ${r.id} + '/reject'}" method="post" class="flex gap-1">
                            <input name="note" class="nb-input !py-1.5 text-xs w-32" placeholder="Reason (opt.)"/>
                            <button class="nb-btn nb-btn-danger !px-3 !py-1.5 text-xs">Reject</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${requests.isEmpty()}" th:replace="~{fragments/ui :: empty('No pending requests right now.')}"></div>

    <div th:if="${pageInfo.totalPages > 1}" class="flex justify-center items-center gap-3 mt-6">
        <a th:if="${!pageInfo.first}" class="nb-btn nb-btn-light" th:href="@{/librarian/requests(page=${pageInfo.number - 1})}">Prev</a>
        <span class="font-bold" th:text="'Page ' + (${pageInfo.number} + 1) + ' of ' + ${pageInfo.totalPages}">Page</span>
        <a th:if="${!pageInfo.last}" class="nb-btn nb-btn-light" th:href="@{/librarian/requests(page=${pageInfo.number + 1})}">Next</a>
    </div>
</main>
</html>
