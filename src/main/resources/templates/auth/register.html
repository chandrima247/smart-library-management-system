<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/authlayout :: auth(~{::main}, 'Request Access')}">
<main>
    <div class="w-full max-w-xl">
        <section class="bg-background neobrutal-border neobrutal-shadow p-8">
            <div class="mb-6">
                <h2 class="font-display text-3xl font-black">Request Access</h2>
                <p class="text-on-surface-variant text-sm mt-1">
                    Create an account. An administrator will review and approve it before you can sign in.
                </p>
            </div>

            <form th:action="@{/register}" th:object="${form}" method="post" class="space-y-5">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-secondary">Full Name</label>
                        <input class="nb-input" type="text" th:field="*{fullName}" placeholder="Jane Doe"/>
                        <p class="text-danger text-xs font-bold" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-secondary">Username</label>
                        <input class="nb-input" type="text" th:field="*{username}" placeholder="jdoe"/>
                        <p class="text-danger text-xs font-bold" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold uppercase tracking-wider text-secondary">Email</label>
                    <input class="nb-input" type="email" th:field="*{email}" placeholder="jane@college.edu"/>
                    <p class="text-danger text-xs font-bold" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-secondary">Role</label>
                        <select class="nb-input" th:field="*{role}">
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-secondary">Department</label>
                        <input class="nb-input" type="text" th:field="*{department}" placeholder="Computer Science"/>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-secondary">Password</label>
                        <input class="nb-input" type="password" th:field="*{password}" placeholder="At least 8 characters"/>
                        <p class="text-danger text-xs font-bold" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-secondary">Confirm Password</label>
                        <input class="nb-input" type="password" th:field="*{confirmPassword}" placeholder="Re-enter password"/>
                        <p class="text-danger text-xs font-bold" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                    </div>
                </div>

                <button class="nb-btn nb-btn-primary w-full py-4" type="submit">Create Account</button>
            </form>

            <div class="mt-6 pt-6 border-t-[3px] border-black border-dashed text-center">
                <a class="font-bold text-primary inline-flex items-center gap-1 hover:underline" th:href="@{/login}">
                    <span class="material-symbols-outlined">arrow_back</span> Back to Sign In
                </a>
            </div>
        </section>
    </div>
</main>
</html>
