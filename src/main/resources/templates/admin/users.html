<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: dashboard(~{::main}, 'User Management', 'users')}">
<main>
    <h1 class="font-display text-3xl font-black mb-6">User Management</h1>

    <div class="flex flex-wrap gap-2 mb-6">
        <a th:each="r : ${roles}" th:href="@{/admin/users(role=${r})}"
           class="nb-btn !px-4 !py-2 text-sm"
           th:classappend="${r == role} ? 'nb-btn-primary' : 'nb-btn-light'"
           th:text="${r}">ROLE</a>
    </div>

    <div class="bg-white neobrutal-border neobrutal-shadow overflow-x-auto" th:if="${!users.isEmpty()}">
        <table class="nb-table">
            <thead><tr><th>Name</th><th>Member Code</th><th>Email</th><th>Status</th><th class="text-right">Set Status</th></tr></thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td class="font-bold" th:text="${u.fullName}">Name</td>
                <td class="text-sm" th:text="${u.memberCode} ?: '—'">code</td>
                <td class="text-sm" th:text="${u.email}">email</td>
                <td>
                    <span class="nb-badge"
                          th:classappend="${u.status.name() == 'ACTIVE'} ? 'bg-success text-white'
                                        : (${u.status.name() == 'SUSPENDED' or u.status.name() == 'REJECTED'} ? 'bg-danger text-white' : 'bg-warning text-black')"
                          th:text="${u.status}">STATUS</span>
                </td>
                <td class="text-right">
                    <form th:action="@{'/admin/users/' + ${u.id} + '/status'}" method="post" class="inline-flex gap-1 justify-end">
                        <select name="status" class="nb-input !py-1.5 text-sm">
                            <option value="ACTIVE">Active</option>
                            <option value="SUSPENDED">Suspended</option>
                            <option value="PENDING">Pending</option>
                            <option value="REJECTED">Rejected</option>
                        </select>
                        <button class="nb-btn nb-btn-light !px-3 !py-1.5 text-xs">Apply</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${users.isEmpty()}" th:replace="~{fragments/ui :: empty('No users in this role.')}"></div>

    <div th:if="${pageInfo.totalPages > 1}" class="flex justify-center items-center gap-3 mt-6">
        <a th:if="${!pageInfo.first}" class="nb-btn nb-btn-light" th:href="@{/admin/users(role=${role}, page=${pageInfo.number - 1})}">Prev</a>
        <span class="font-bold" th:text="'Page ' + (${pageInfo.number} + 1) + ' of ' + ${pageInfo.totalPages}">Page</span>
        <a th:if="${!pageInfo.last}" class="nb-btn nb-btn-light" th:href="@{/admin/users(role=${role}, page=${pageInfo.number + 1})}">Next</a>
    </div>
</main>
</html>
