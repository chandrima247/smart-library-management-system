# ============================================================================
#  SLMS - Default profile (DEV): embedded H2, zero external setup required.
#  For production MySQL run with:  --spring.profiles.active=mysql
# ============================================================================
spring.application.name=SLMS

# --- Datasource: H2 file-based (data persists between restarts) ---
spring.datasource.url=jdbc:h2:file:./data/slms;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
# Server-rendered Thymeleaf views read lazy associations while rendering, so the
# persistence context is kept open for the request. Acceptable for this MVP.
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# --- H2 web console (dev aid): http://localhost:8080/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Connection pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=SlmsPool

# --- Server (binds to $PORT on cloud hosts like Render) ---
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# --- Multipart (cover uploads / bulk import headroom) ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================================
#  SLMS application settings (business rules)
# ============================================================================
slms.circulation.home-loan-days=14
slms.circulation.max-active-loans=5
slms.circulation.fine-per-day=2.00
slms.library.reading-hall-capacity=100
slms.library.name=Main Reading Hall

# Google Books metadata lookup
slms.google-books.base-url=https://www.googleapis.com/books/v1
slms.google-books.enabled=true
# Optional API key (leave blank to use anonymous quota)
slms.google-books.api-key=

# Logging
logging.level.com.college.slms=INFO
