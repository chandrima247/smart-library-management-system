# ============================================================================
#  SLMS - Production profile: MySQL 8
#  Activate with:  java -jar slms.jar --spring.profiles.active=mysql
#  Create the schema first:  CREATE DATABASE slms CHARACTER SET utf8mb4;
# ============================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:slms}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true
spring.jpa.show-sql=false

# H2 console must be off in production
spring.h2.console.enabled=false

# Thymeleaf template caching ON in production
spring.thymeleaf.cache=true

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=SlmsPool
